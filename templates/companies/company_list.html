{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>Company Management</h2>

    <a href="{% url 'company_create' %}" class="btn btn-primary">

        <i class="bi bi-plus-circle"></i>

        New Company

    </a>

</div>

<table class="table table-striped">

    <thead>

        <tr>

            <th>Name</th>

            <th>Status</th>

            <th width="180">Actions</th>

        </tr>

    </thead>

    <tbody>

    {% for company in companies %}

        <tr>

            <td>{{ company.name }}</td>

            <td>

                {% if company.is_active %}

                    Active

                {% else %}

                    Inactive

                {% endif %}

            </td>

            <td>

                <a href="{% url 'company_edit' company.id %}"

                   class="btn btn-warning btn-sm">

                    Edit

                </a>

                <a href="{% url 'company_delete' company.id %}"

                   class="btn btn-danger btn-sm"

                   onclick="return confirm('Delete this company?')">

                    Delete

                </a>

            </td>

        </tr>

    {% empty %}

        <tr>

            <td colspan="3">

                No companies found.

            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
