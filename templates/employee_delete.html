{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header bg-danger text-white">

        <h3>

            Delete Employee

        </h3>

    </div>

    <div class="card-body">

        <p class="lead">

            Are you sure you want to delete this employee?

        </p>

        <table class="table">

            <tr>

                <th>Name</th>

                <td>

                    {{ employee.first_name }}
                    {{ employee.last_name }}

                </td>

            </tr>

            <tr>

                <th>Username</th>

                <td>

                    {{ employee.username }}

                </td>

            </tr>

            <tr>

                <th>Email</th>

                <td>

                    {{ employee.email }}

                </td>

            </tr>

        </table>

        <form method="post">

            {% csrf_token %}

            <a href="{% url 'user_management' %}"
               class="btn btn-secondary">

                Cancel

            </a>

            <button
                type="submit"
                class="btn btn-danger">

                Delete Employee

            </button>

        </form>

    </div>

</div>

{% endblock %}
