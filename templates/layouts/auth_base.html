{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        {% block title %}

        Authentication

        {% endblock %}

    </title>

    <link rel="stylesheet"
          href="{% static 'css/login.css' %}">

          
    <link rel="stylesheet"
          href="{% static 'css/upload.css' %}">

</head>

<body>

<div class="login-container">

    <!-- LEFT SIDE -->

    <section class="left-side">

        <div class="banner">

            Exploratory WellTarget Governance Platform

        </div>

        <div class="overlay">

            {% block left_content %}

            {% endblock %}

        </div>

    </section>


    <!-- RIGHT SIDE -->

    <section class="right-side">

        <div class="login-panel">

            {% block auth_content %}

            {% endblock %}

        </div>

    </section>

</div>

</body>

</html>
