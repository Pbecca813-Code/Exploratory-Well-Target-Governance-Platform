{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<div class="card shadow border-0">

<div class="card-header bg-danger text-white">

<h3>

Delete Project

</h3>

</div>

<div class="card-body">

<h5>

Are you sure you want to delete this project?

</h5>

<br>

<table class="table">

<tr>

<th width="220">

Project

</th>

<td>

{{ project.project_name }}

</td>

</tr>

<tr>

<th>

Lead Interpreter

</th>

<td>

{{ project.lead_interpreter }}

</td>

</tr>

<tr>

<th>

Status

</th>

<td>

{{ project.get_status_display }}

</td>

</tr>

</table>

<form method="post">

{% csrf_token %}

<a

href="{% url 'project_management' %}"

class="btn btn-secondary">

Cancel

</a>

<button

type="submit"

class="btn btn-danger">

<i class="bi bi-trash"></i>

Delete Project

</button>

</form>

</div>

</div>

</div>

{% endblock %}
