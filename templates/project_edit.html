{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h3>Edit Project</h3>

        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <a href="{% url 'project_management' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

                <button
                    type="submit"
                    class="btn btn-success">

                    Save Changes

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
