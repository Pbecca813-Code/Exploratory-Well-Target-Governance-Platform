{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header bg-danger text-white">

        <h3>

            Delete Review

        </h3>

    </div>

    <div class="card-body">

        <p>

            Are you sure you want to delete this review?

        </p>

        <strong>

            {{ review.well_target }}

        </strong>

        <form method="post">

            {% csrf_token %}

            <a href="{% url 'reviews' %}"
               class="btn btn-secondary">

                Cancel

            </a>

            <button class="btn btn-danger">

                Delete

            </button>

        </form>

    </div>

</div>

{% endblock %}
