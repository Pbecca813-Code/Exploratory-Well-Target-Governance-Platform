{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header bg-primary text-white">

        <h3 class="mb-0">

            {% if form.instance.pk %}
                Edit Review
            {% else %}
                New Review
            {% endif %}

        </h3>

    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <a href="{% url 'reviews' %}"
               class="btn btn-secondary">

                Cancel

            </a>

            <button type="submit"
                    class="btn btn-primary">

                Save Review

            </button>

        </form>

    </div>

</div>

{% endblock %}
