{% extends "base.html" %}

{% block content %}

<div class="card shadow-lg border-0">

    <div class="card-header bg-danger text-white">

        <h3>

            Delete Well Target

        </h3>

    </div>

    <div class="card-body">

        <p>

            Are you sure you want to delete

            <strong>

                {{ target.target_name }}

            </strong>?

        </p>

        <form method="post">

            {% csrf_token %}

            <a
                href="{% url 'well_targets' %}"
                class="btn btn-secondary">

                Cancel

            </a>

            <button
                class="btn btn-danger">

                Delete Well Target

            </button>

        </form>

    </div>

</div>

{% endblock %}
